# API Gateway Service Kubernetes Manifest
# Implements the API Gateway architecture with proper RBAC, resource limits, and monitoring

apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    component: infrastructure
spec:
  type: ClusterIP
  ports:
    - port: 8080
      name: http-api
    - port: 8000
      name: metrics
  selector:
    app: api-gateway

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    component: infrastructure
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # H29: pod-level securityContext — runs as non-root with no extra caps.
      # Aligns with Pod Security Standard 'restricted' baseline.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          # H30 (Wave 12, 2026-05-11): pinned to a specific minor-version
          # tag instead of `:latest`. The build pipeline that publishes
          # this image lives outside this repo; production deploys should
          # additionally digest-pin via:
          #   docker pull predacore/api-gateway:1.6.0
          #   docker inspect predacore/api-gateway:1.6.0 \
          #     --format='{{index .RepoDigests 0}}'
          # then replace the image line with `predacore/api-gateway@sha256:...`.
          # `imagePullPolicy: IfNotPresent` ensures pods don't silently
          # re-pull on every restart even when the tag pointer moves.
          image: predacore/api-gateway:1.6.0
          imagePullPolicy: IfNotPresent
          # H29: container-level hardening — drop all caps, read-only root fs.
          # /tmp is mounted writable below for processes that need scratch space.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8080
              name: http-api
            - containerPort: 8000
              name: metrics
          envFrom:
            - configMapRef:
                name: api-gateway-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  # H31: merged single `ingress:` list (previous YAML had two `ingress:` keys
  # at the same level — YAML keeps only the last one, so the bare-port allow
  # block was silently dropped). Combined: monitoring namespace → :8000,
  # internal namespace → :8080.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              name: internal
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  labels:
    app: api-gateway
spec:
  jobLabel: api-gateway
  endpoints:
    - port: metrics
      interval: 15s
  selector:
    matchLabels:
      app: api-gateway
  namespaceSelector:
    matchNames:
      - default