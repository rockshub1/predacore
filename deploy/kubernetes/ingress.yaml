apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: prometheus
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.prometheus.ai
    secretName: prometheus-tls-secret
  rules:
  - host: api.prometheus.ai
    http:
      paths:
      - path: /monitoring
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000

# H33 + C6 cleanup notes (2026-05-07):
# - The previous /daf and /wil rules pointed at retired services
#   (daf-service ClusterIP and wil-service) — both removed when C6 deleted
#   the standalone daf-service Deployment.
# - If gRPC routes are reintroduced, do NOT put them in this Ingress: nginx
#   ingress applies `nginx.ingress.kubernetes.io/backend-protocol: GRPC` to
#   the WHOLE Ingress object, so mixing gRPC and HTTP backends in one
#   Ingress is broken (the previous /daf, /wil routes were unreachable as
#   gRPC because of this).
# - Correct pattern: a separate Ingress (e.g. `prometheus-grpc-ingress`)
#   with `nginx.ingress.kubernetes.io/backend-protocol: GRPC` annotation
#   for the gRPC services, and keep this one for HTTP only.
