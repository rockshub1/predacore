apiVersion: apps/v1
kind: Deployment
metadata:
  name: daf-service
  labels:
    app: prometheus
    component: dynamic-agent-fabric
spec:
  replicas: 3
  selector:
    matchLabels:
      app: prometheus
      component: dynamic-agent-fabric
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: prometheus
        component: dynamic-agent-fabric
    spec:
      containers:
      - name: daf-service
        image: daf-service:latest
        ports:
        - containerPort: 50055
        resources:
          limits:
            cpu: "2"
            memory: 1Gi
          requests:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          exec:
            command: ["python", "-c", "import grpc; grpc.insecure_channel('localhost:50055').subscribe(lambda x: x)"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["python", "-c", "import grpc; grpc.insecure_channel('localhost:50055').subscribe(lambda x: x)"]
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: WIL_SERVICE_URL
          value: "wil-service:50054"
        - name: EGM_SERVICE_URL
          value: "egm-service:50053"

---
apiVersion: v1
kind: Service
metadata:
  name: daf-service
spec:
  selector:
    app: prometheus
    component: dynamic-agent-fabric
  ports:
  - protocol: TCP
    port: 50055
    targetPort: 50055
  type: ClusterIP