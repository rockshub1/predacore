name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Open-core split (2026-05-15): the Rust kernel (predacore_core) now lives
# in a separate private repository (rockshub1/predacore-kernel-rust) and
# ships as pre-compiled wheels on PyPI. This workflow only tests the
# Python orchestration layer — pip resolves predacore_core from PyPI
# automatically via the dependency declaration in pyproject.toml.

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install Python package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/

      - name: Run tests
        run: pytest --tb=short -q
        env:
          PREDACORE_TEST_MODE: "1"
