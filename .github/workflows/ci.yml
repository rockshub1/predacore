name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/predacore_core_crate/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/predacore_core_crate/Cargo.toml') }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install maturin

      - name: Build + install Rust crate (provides predacore_core)
        run: |
          cd src/predacore_core_crate
          maturin develop --release

      - name: Install Python package + dev deps
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/

      - name: Run tests
        run: pytest --tb=short -q
        env:
          PREDACORE_TEST_MODE: "1"

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # pyo3 compiles against a specific Python ABI. macos-latest ships
      # Python 3.14 by default, but pyo3 0.23.x tops out at 3.13. Pin the
      # interpreter so cargo test / cargo clippy compile against a
      # supported version.
      - name: Set up Python 3.13 (for PyO3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/predacore_core_crate/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/predacore_core_crate/Cargo.toml') }}

      - name: Run Rust tests
        run: |
          cd src/predacore_core_crate
          cargo test --release

      - name: Check Rust formatting
        run: |
          cd src/predacore_core_crate
          cargo fmt --check

      - name: Clippy lints
        run: |
          cd src/predacore_core_crate
          cargo clippy -- -D warnings
